name: CI — Lint + Test

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.4.10"

jobs:
  # ────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff==0.7.4

      - name: Lint backend
        run: ruff check backend/
        continue-on-error: false

      - name: Format check
        run: ruff format --check backend/

  # ────────────────────────────────────────────────
  test-core:
    name: Tests — Core Service
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dilix
          POSTGRES_PASSWORD: dilix
          POSTGRES_DB: dilix_core_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    env:
      DILIX_DATABASE_URL: postgresql+asyncpg://dilix:dilix@localhost:5432/dilix_core_test
      DILIX_REDIS_URL: redis://localhost:6379/0
      DILIX_JWT_SECRET: ci-test-secret-32-characters-long
      DILIX_ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install shared kernel
        run: pip install -e backend/libs/shared

      - name: Install core dependencies
        working-directory: backend/services/core
        run: |
          pip install \
            fastapi uvicorn pydantic pydantic-settings \
            sqlalchemy asyncpg alembic \
            pyjwt "passlib[argon2]" email-validator \
            nats-py httpx pyotp \
            pytest pytest-asyncio aiosqlite

      - name: Run migrations
        working-directory: backend/services/core
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend/services/core
        run: pytest tests/ -v --tb=short -q

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/services/core/.pytest_cache/

  # ────────────────────────────────────────────────
  security-scan:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install bandit[toml]
      - name: Run bandit
        run: bandit -r backend/ -ll -x backend/services/core/tests/
        continue-on-error: true  # warn-only تا کد stabilize شود
