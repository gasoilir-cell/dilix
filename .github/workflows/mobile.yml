name: Mobile — Build Android APK

# بیلدِ APK روی runnerِ ابری انجام می‌شود تا سرورِ تولید (که Android SDK/Flutter
# ندارد و نباید با ~۱۰GB تولچین سنگین شود) دست‌نخورده بماند.

on:
  push:
    branches: [main]
    paths:
      - "frontend/mobile/**"
      - ".github/workflows/mobile.yml"
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Base URL سرویسِ Core که APK به آن وصل می‌شود"
        required: true
        default: "https://api.dilix.ir"
        type: string

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # آخرین Flutterِ پایدار (بدونِ pinِ نسخهٔ ثابت) تا کدی که از APIهای جدیدترِ
      # Material (مثلِ CardThemeData، فقط از Flutter 3.27+) استفاده می‌کند کامپایل شود.
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      # اسکفولدِ android/ را با خودِ Flutterِ نصب‌شده بازتولید می‌کنیم تا Gradle/AGP/Kotlin
      # همیشه با نسخهٔ Flutterِ runner هماهنگ باشد (به‌جای نگه‌داشتنِ دستیِ این نسخه‌ها).
      - name: Regenerate Android scaffold (Flutter-matched Gradle/AGP/Kotlin)
        run: flutter create --platforms=android --org com.dilix --overwrite .

      # بازاعمالِ سفارشی‌سازی‌های Dilix که flutter create نمی‌داند: minSdk، مجوزِ اینترنت،
      # و placeholderِ appAuthRedirectScheme برای flutter_appauth.
      - name: Apply Dilix Android customizations
        run: |
          python3 - <<'PY'
          import re, pathlib

          gradle = pathlib.Path("android/app/build.gradle")
          t = gradle.read_text()
          # minSdk را صرفِ‌نظر از قالبِ نسخهٔ Flutter، صراحتاً ۲۱ می‌کنیم.
          t = re.sub(r"minSdk(Version)?\s*=?\s*flutter\.minSdkVersion", "minSdk = 21", t)
          if re.search(r"minSdk\s*=?\s*21\b", t) is None:
              t = t.replace("defaultConfig {", "defaultConfig {\n        minSdk = 21", 1)
          if "appAuthRedirectScheme" not in t:
              t = t.replace(
                  "defaultConfig {",
                  "defaultConfig {\n        manifestPlaceholders += [appAuthRedirectScheme: \"app.dilix\"]",
                  1,
              )
          gradle.write_text(t)

          manifest = pathlib.Path("android/app/src/main/AndroidManifest.xml")
          m = manifest.read_text()
          if "android.permission.INTERNET" not in m:
              m = m.replace(
                  ">",
                  ">\n    <uses-permission android:name=\"android.permission.INTERNET\"/>",
                  1,
              )
          manifest.write_text(m)
          print("--- build.gradle defaultConfig ---")
          print("\n".join(l for l in gradle.read_text().splitlines() if "applicationId" in l or "minSdk" in l or "manifestPlaceholders" in l))
          print("--- manifest permission ---")
          print("\n".join(l for l in manifest.read_text().splitlines() if "uses-permission" in l))
          PY

      - name: Analyze (non-blocking)
        run: flutter analyze || true

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=DILIX_API_BASE_URL=${{ github.event.inputs.api_base_url || 'https://api.dilix.ir' }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dilix-mobile-release-apk
          path: frontend/mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
