name: Mobile — Build Android APK

# بیلدِ APK روی runnerِ ابری انجام می‌شود تا سرورِ تولید (که Android SDK/Flutter
# ندارد و نباید با ~۱۰GB تولچین سنگین شود) دست‌نخورده بماند.

on:
  push:
    branches: [main]
    paths:
      - "frontend/mobile/**"
      - ".github/workflows/mobile.yml"
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Base URL سرویسِ Core که APK به آن وصل می‌شود"
        required: true
        default: "http://185.55.226.250:8010"
        type: string

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # آخرین Flutterِ پایدار (بدونِ pinِ نسخهٔ ثابت) تا کدی که از APIهای جدیدترِ
      # Material (مثلِ CardThemeData، فقط از Flutter 3.27+) استفاده می‌کند کامپایل شود.
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      # اسکفولدِ android/ را کاملاً از صفر با خودِ Flutterِ نصب‌شده تولید می‌کنیم (نه صرفِ
      # patch رویِ نسخهٔ کامیت‌شده) تا هیچ فایلِ قدیمیِ Gradle/Groovy با فایل‌های جدیدِ
      # Kotlin-DSL (build.gradle.kts) که Flutterِ جدید تولید می‌کند تداخل نکند.
      - name: Regenerate Android scaffold (Flutter-matched Gradle/AGP/Kotlin)
        run: |
          rm -rf android
          flutter create --platforms=android --org com.dilix .

      # بازاعمالِ سفارشی‌سازی‌های Dilix که flutter create نمی‌داند: minSdk، مجوزِ اینترنت،
      # و placeholderِ appAuthRedirectScheme برای flutter_appauth (سینتکسِ Kotlin DSL).
      - name: Apply Dilix Android customizations
        run: |
          python3 - <<'PY'
          import re, pathlib

          gradle = pathlib.Path("android/app/build.gradle.kts")
          t = gradle.read_text()
          t = re.sub(r"minSdk\s*=\s*flutter\.minSdkVersion", "minSdk = 21", t)
          # flutter.compileSdkVersion برای این کانالِ Flutter روی ۳۱ resolve می‌شود، درحالی‌که
          # وابستگی‌های transitiveِ flutter_appauth/flutter_facebook_auth/flutter_secure_storage
          # حداقل compileSdk=36 می‌خواهند (خطای checkReleaseAarMetadata).
          t = re.sub(r"compileSdk\s*=\s*flutter\.compileSdkVersion", "compileSdk = 36", t)
          if "manifestPlaceholders" not in t:
              t = t.replace(
                  "defaultConfig {",
                  'defaultConfig {\n        manifestPlaceholders["appAuthRedirectScheme"] = "app.dilix"',
                  1,
              )
          gradle.write_text(t)

          manifest = pathlib.Path("android/app/src/main/AndroidManifest.xml")
          m = manifest.read_text()
          if "android.permission.INTERNET" not in m:
              m = m.replace(
                  ">",
                  ">\n    <uses-permission android:name=\"android.permission.INTERNET\"/>",
                  1,
              )
          # سرورِ Coreِ فعلی روی http (بدونِ TLS) سرویس می‌دهد؛ Android از targetSdk 28
          # ترافیکِ cleartext را پیش‌فرض مسدود می‌کند، پس باید صریحاً مجاز شود وگرنه
          # login/register با خطای cleartext-not-permitted شکست می‌خورد.
          if "usesCleartextTraffic" not in m:
              m = m.replace("<application", "<application\n        android:usesCleartextTraffic=\"true\"", 1)
          manifest.write_text(m)

          # پکیج‌هایی مثلِ flutter_appauth ماژولِ Androidِ خودشان را (داخلِ pub cache) با
          # compileSdk قدیمی (۳۱) منتشر کرده‌اند؛ عوض‌کردنِ compileSdk فقط در android/app کافی
          # نیست چون :flutter_appauth/:flutter_facebook_auth/:flutter_secure_storage هرکدام
          # ماژولِ Gradleِ جداگانه‌اند. با یک subprojects block در ریشه، compileSdk را روی همهٔ
          # ماژول‌های Android library (صرف‌نظر از مقدارِ داخلیِ خودشان) به ۳۶ force می‌کنیم.
          root_gradle = pathlib.Path("android/build.gradle.kts")
          rt = root_gradle.read_text()
          force_block = '''
          subprojects {
              if (project.name != "app") {
                  afterEvaluate {
                      extensions.findByType(com.android.build.gradle.LibraryExtension::class.java)?.compileSdk = 36
                  }
              }
          }
          '''
          if "com.android.build.gradle.LibraryExtension" not in rt:
              rt += force_block
          root_gradle.write_text(rt)

          print("--- build.gradle.kts defaultConfig ---")
          print("\n".join(l for l in gradle.read_text().splitlines() if "applicationId" in l or "minSdk" in l or "compileSdk" in l or "manifestPlaceholders" in l))
          print("--- manifest permission ---")
          print("\n".join(l for l in manifest.read_text().splitlines() if "uses-permission" in l))
          PY

      - name: Analyze (non-blocking)
        run: flutter analyze || true

      # تست‌های ویجت/واحد (مثلِ test/call_flow_test.dart و marketplace_screen_test.dart)
      # بدونِ نیاز به دستگاه/شبیه‌ساز روی همین runner اجرا می‌شوند و شکستشان بیلد را
      # متوقف می‌کند تا رگرسیونِ UI پیش از انتشارِ APK گرفته شود.
      - name: Run widget/unit tests
        run: flutter test

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=DILIX_API_BASE_URL=${{ github.event.inputs.api_base_url || 'http://185.55.226.250:8010' }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dilix-mobile-release-apk
          path: frontend/mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
