name: CD — Build + Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options: [staging, production-ir, production-global]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/dilix-core

jobs:
  # ────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    # بیلد سنگین فقط روی سرور SSH (طبق سیاست پروژه)
    # این job فقط image را می‌سازد — push از SSH runner
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: backend/services/core
          file: backend/services/core/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/dilix
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ needs.build.outputs.image_tag }}
            docker compose -f docker-compose.prod.yml up -d --no-deps core
            docker compose -f docker-compose.prod.yml exec -T core alembic upgrade head
            echo "✅ Staging deployed: ${{ needs.build.outputs.image_tag }}"

  # ────────────────────────────────────────────────
  deploy-production-ir:
    name: Deploy → Production IR
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    environment: production-ir
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production-ir'

    steps:
      - name: Deploy via SSH (Iran Region)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_IR_SSH_HOST }}
          username: ${{ secrets.PROD_IR_SSH_USER }}
          key: ${{ secrets.PROD_IR_SSH_KEY }}
          script: |
            cd /opt/dilix
            docker pull ${{ needs.build.outputs.image_tag }}
            # Rolling update — zero downtime
            docker compose -f docker-compose.prod.yml up -d --no-deps --scale core=2 core
            sleep 15
            docker compose -f docker-compose.prod.yml exec -T core alembic upgrade head
            docker compose -f docker-compose.prod.yml up -d --no-deps --scale core=1 core
            echo "✅ Production IR deployed"
