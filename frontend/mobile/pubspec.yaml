name: dilix_mobile
description: Dilix — Super-App (Flutter, mobile-first, RTL، چندزبانه)
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.2
  intl: ^0.20.2 # باید با نسخهٔ pinِ flutter_localizations در Flutter SDK هماهنگ باشد
  shared_preferences: ^2.3.2 # پایداریِ نشست (access/refresh token) بین اجراها
  # ورودِ اجتماعی (بومی)
  flutter_appauth: ^8.0.0 # Google/Microsoft/Apple via OIDC (PKCE)
  flutter_facebook_auth: ^7.1.1 # Facebook access_token
  # تماسِ صوتی/تصویری (WebRTC) — signaling روی WS /v1/ws، relay سمتِ سرور
  flutter_webrtc: ^0.12.3
  # پخشِ ویدیو برای فیدِ Reels
  video_player: ^2.9.2
  # انتخابِ تصویر/ویدیو از گالریِ گوشی برای انتشارِ پستِ فید
  image_picker: ^1.1.2
  # نمای وبِ Dilix داخلِ تب‌های «کره» و «پیام‌ها» (رندرِ روی دستگاه، نه اتوماسیونِ مرورگر)
  webview_flutter: ^4.10.0
  # پیاده‌سازیِ اندرویدِ WebView برای مجوزهایِ دوربین/میکروفن/موقعیت و انتخابِ فایل
  webview_flutter_android: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
