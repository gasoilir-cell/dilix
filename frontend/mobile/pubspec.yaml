name: dilix_mobile
description: Dilix — Super-App (Flutter, mobile-first, RTL، چندزبانه)
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.2
  intl: ^0.20.2 # باید با نسخهٔ pinِ flutter_localizations در Flutter SDK هماهنگ باشد
  # ورودِ اجتماعی (بومی)
  flutter_appauth: ^8.0.0 # Google/Microsoft/Apple via OIDC (PKCE)
  flutter_facebook_auth: ^7.1.1 # Facebook access_token

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
