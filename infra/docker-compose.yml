# زیرساخت توسعه‌ی محلی Dilix (Milestone 0).
# هشدار: بیلد ایمیج و اجرای سنگین فقط روی سرور SSH — نه در کانتینر توسعه.
# این فایل برای راه‌اندازی وابستگی‌های لوکال (DB/Cache/Search/Storage/Broker) است.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dilix
      POSTGRES_PASSWORD: dilix
      POSTGRES_DB: dilix_core
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports: ["9200:9200"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dilix
      MINIO_ROOT_PASSWORD: dilix-secret
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  nats:
    image: nats:2.10
    command: ["-js"]   # JetStream برای Event Backbone
    ports: ["4222:4222"]

volumes:
  pgdata:
  miniodata:
