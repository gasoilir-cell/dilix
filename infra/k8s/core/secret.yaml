# !! این فایل را در git commit نکنید !!
# در production از Vault یا External Secrets Operator استفاده کنید.
# مثال برای راه‌اندازی اولیه:
#
# kubectl create secret generic dilix-core-secrets \
#   --namespace dilix \
#   --from-literal=DILIX_JWT_SECRET=$(openssl rand -hex 32) \
#   --from-literal=DILIX_DATABASE_URL='postgresql+asyncpg://...' \
#   --from-literal=DILIX_SAMAN_SECRET='...' \
#   --from-literal=DILIX_MINIO_ACCESS_KEY='...' \
#   --from-literal=DILIX_MINIO_SECRET_KEY='...'
#
# یا با External Secrets Operator از Vault:
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dilix-core-secrets
  namespace: dilix
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: dilix-core-secrets
    creationPolicy: Owner
  data:
    - secretKey: DILIX_JWT_SECRET
      remoteRef:
        key: dilix/core
        property: jwt_secret
    - secretKey: DILIX_DATABASE_URL
      remoteRef:
        key: dilix/core
        property: database_url
    - secretKey: DILIX_SAMAN_SECRET
      remoteRef:
        key: dilix/saman
        property: secret
    - secretKey: DILIX_MINIO_ACCESS_KEY
      remoteRef:
        key: dilix/minio
        property: access_key
    - secretKey: DILIX_MINIO_SECRET_KEY
      remoteRef:
        key: dilix/minio
        property: secret_key
