# زیرساخت production Dilix — برای single-node یا staging
# در production چند-node از K8s manifests استفاده کنید.
version: "3.9"

services:
  core:
    image: ghcr.io/dilix/dilix-core:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback

  core-relay:
    image: ghcr.io/dilix/dilix-core:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env.production
    command: python -m app.worker
    depends_on:
      - core

  ai:
    image: ghcr.io/dilix/dilix-ai-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env.production
    expose:
      - "8001"
    depends_on:
      - core
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DILIX_PG_USER}
      POSTGRES_PASSWORD: ${DILIX_PG_PASSWORD}
      POSTGRES_DB: dilix_core
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DILIX_PG_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${DILIX_REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: --js --sd=/data
    volumes:
      - nats_data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${DILIX_MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${DILIX_MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - core

volumes:
  postgres_data:
  redis_data:
  nats_data:
  minio_data:
